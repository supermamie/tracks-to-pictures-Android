# GitHub Workflow — Build and Release Android APK
# Triggers only on manual workflow_dispatch

name: Build and Release Android APK
on:
  workflow_dispatch:

env:
  OWNER: supermamie
  NAME: tracks-to-pictures-Android

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Checkout Android repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OWNER }}/${{ env.NAME }}
          ref: main
          path: android
          fetch-depth: 0

      - name: Download web archive from GitLab
        id: download-web
        run: |
          mkdir -p android/build
          
          # Load site config from repo
          SITE_REPO=$(cat android/.github/site-config.json | jq -r '.site_repo')
          SITE_HOST=$(cat android/.github/site-config.json | jq -r '.site_host')
          
          echo "Building URLs from config: $SITE_REPO on $SITE_HOST"
          
          # API URL uses path with encoded /
          API_URL="https://$SITE_HOST/api/v4/projects/$SITE_REPO/releases"
          echo "API URL: $API_URL"
          
          # Download GitLab releases (API needs / encoded as %2F)
          echo "Fetching GitLab releases..."
          curl -sfL "$API_URL" -o android/build/releases.json || { echo "❌ Failed to download releases"; cat android/build/releases.json; exit 1; }
          
          # Extract latest valid release (with non-null tag_name)
          LATEST_TAG=$(jq -r '[.[] | select(.tag_name != null and (.tag_name | type) == "string")] | sort_by(.created_at) | .[-1].tag_name' android/build/releases.json)
          
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "❌ No valid releases found"
            echo "Releases content: $(cat android/build/releases.json)"
            exit 1
          fi
          
          echo "Latest GitLab release: $LATEST_TAG"
          
          # Count all matching versions for incremental numbering
          ALL_COUNT=$(jq -r --arg ver "$LATEST_TAG" \
            '[.[] | select(.tag_name != null and (.tag_name == "v" + $ver or (.tag_name | startswith("v" + $ver + "."))))] | length' android/build/releases.json)
          
          INCREMENTAL_COUNT=$(jq -r --arg ver "$LATEST_TAG" \
            '[.[] | select(.tag_name != null and (.tag_name | startswith("v" + $ver + ".")))] | length' android/build/releases.json)
          
          # Determine the build version
          if [ "$INCREMENTAL_COUNT" -eq 0 ]; then
            BUILD_VERSION="$LATEST_TAG"
          else
            BUILD_VERSION="$LATEST_TAG.$(( INCREMENTAL_COUNT + 1 ))"
          fi
          
          echo "Build version: $BUILD_VERSION"
          echo "VERSION_NAME=$BUILD_VERSION" >> $GITHUB_ENV
          
          # Download the web archive from GitLab (use / not %2F)
          ARCHIVE_URL="https://$SITE_HOST/$SITE_REPO/-/archive/$LATEST_TAG/tracks-to-pictures-$LATEST_TAG.zip"
          echo "Downloading: $ARCHIVE_URL"
          curl -sfL -o android/build/web-source.zip "$ARCHIVE_URL"
          
          # Verify download
          if [ ! -s android/build/web-source.zip ]; then
            echo "❌ Download failed — empty file"
            exit 1
          fi
          echo "✅ Downloaded: $(du -b android/build/web-source.zip | cut -f1) bytes"

      - name: Fix web structure
        run: |
          cd android
          python3 ../.github/scripts/fix_web_structure.py build/

      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
        run: |
          cd android
          apk=app/build/outputs/apk/release/app-release.apk
          tag="v${{ env.VERSION_NAME }}"
          
          # Create Android source archive
          echo "Creating Android source archive..."
          cd app/src/main
          zip -r ../../android-src.zip java/ res/ AndroidManifest.xml
          cd ../../..
          
          gh release create "$tag" "$apk" --title "$tag" --draft
          if [ -f web-source.zip ]; then
            gh release upload "$tag" web-source.zip
          fi
          if [ -f android-src.zip ]; then
            gh release upload "$tag" android-src.zip
          fi
