# GitHub Workflow — Build and Release Android APK
# Triggers only on manual workflow_dispatch

name: Build and Release Android APK
on:
  workflow_dispatch:

env:
  OWNER: supermamie
  NAME: tracks-to-pictures-Android

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Checkout Android repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OWNER }}/${{ env.NAME }}
          ref: main
          path: android
          fetch-depth: 0

      - name: Download web archive
        id: download-web
        run: |
          mkdir -p android/build
          
          # Parse git_repo URL from android checkout (paths relative to workspace root)
          python3 android/.github/scripts/parse_git_repo.py android/app-release-metadata.yml android/.github/site-config.json > android/build/parse.txt
          
          # Read parsed values
          PLATFORM=$(grep '^platform=' android/build/parse.txt | cut -d= -f2)
          REPO=$(grep '^repo=' android/build/parse.txt | cut -d= -f2)
          GIT_REPO=$(grep '^git_repo=' android/build/parse.txt | cut -d= -f2)
          
          echo "parsed: $GIT_REPO → platform=$PLATFORM, repo=$REPO"
          
          if [ "$PLATFORM" = "github" ]; then
            echo "=== GitHub mode ==="
            curl -sfL "https://api.github.com/repos/$REPO/releases" -o android/build/releases.json || { echo "❌ Failed to fetch GitHub releases"; exit 1; }
            # Latest release tag (keep the 'v' prefix)
            LATEST_TAG=$(jq -r '[.[] | select(.tag_name != null) | select(.tag_name | startswith("v"))] | sort_by(.published_at) | .[-1].tag_name' android/build/releases.json)
            if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then echo "❌ No GitHub releases found"; exit 1; fi
            echo "Latest GitHub release: $LATEST_TAG"
            # Count incrementals (v1.0.7.1, v1.0.7.2, etc.)
            INCREMENTAL_COUNT=$(jq -r --arg ver "$LATEST_TAG" '[.[] | select(.tag_name | startswith("v" + $ver + "."))] | length' android/build/releases.json)
            if [ "$INCREMENTAL_COUNT" -gt 0 ]; then BUILD_VERSION="$LATEST_TAG.$(( INCREMENTAL_COUNT + 1 ))"; else BUILD_VERSION="$LATEST_TAG"; fi
            echo "Build version: $BUILD_VERSION"
            # GitHub archive uses the tag with 'v'
            curl -sfL "https://github.com/$REPO/archive/refs/tags/$LATEST_TAG.zip" -o android/build/web-source.zip
            
          elif [ "$PLATFORM" = "gitlab" ]; then
            echo "=== GitLab mode ==="
            # API needs / encoded as %2F
            API_REPO=$(echo "$REPO" | sed 's|/|%2F|g')
            curl -sfL "https://gitlab.com/api/v4/projects/$API_REPO/releases" -o android/build/releases.json || { echo "❌ Failed to fetch GitLab releases"; exit 1; }
            # Latest release tag (keep the 'v' prefix)
            LATEST_TAG=$(jq -r '[.[] | select(.tag_name != null) | select(.tag_name | startswith("v"))] | sort_by(.created_at) | .[-1].tag_name' android/build/releases.json)
            if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then echo "❌ No GitLab releases found"; exit 1; fi
            echo "Latest GitLab release: $LATEST_TAG"
            # Count incrementals (v1.0.7.1, v1.0.7.2, etc.)
            INCREMENTAL_COUNT=$(jq -r --arg ver "$LATEST_TAG" '[.[] | select(.tag_name != null) | select(.tag_name | startswith("v" + $ver + "."))] | length' android/build/releases.json)
            if [ "$INCREMENTAL_COUNT" -gt 0 ]; then BUILD_VERSION="$LATEST_TAG.$(( INCREMENTAL_COUNT + 1 ))"; else BUILD_VERSION="$LATEST_TAG"; fi
            echo "Build version: $BUILD_VERSION"
            # GitLab archive uses the tag with 'v'
            ARCHIVE_URL="https://gitlab.com/$REPO/-/archive/$LATEST_TAG/$REPO-$LATEST_TAG.zip"
            echo "Downloading: $ARCHIVE_URL"
            curl -sfL -o android/build/web-source.zip "$ARCHIVE_URL"
            
          else
            echo "=== Direct URL mode ==="
            curl -sfL -o android/build/web-source.zip "$GIT_REPO"
            BUILD_VERSION="1.0.0"
          fi
          
          # Verify download
          if [ ! -s android/build/web-source.zip ]; then echo "❌ Download failed — empty file"; exit 1; fi
          echo "✅ Downloaded: $(du -b android/build/web-source.zip | cut -f1) bytes"
          echo "VERSION_NAME=$BUILD_VERSION" >> $GITHUB_ENV

      - name: Fix web structure
        run: |
          python3 android/.github/scripts/fix_web_structure.py android/build/

      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
        run: |
          cd android
          apk=app/build/outputs/apk/release/app-release.apk
          tag="v${{ env.VERSION_NAME }}"
          
          # Create Android source archive
          echo "Creating Android source archive..."
          cd app/src/main
          zip -r ../../android-src.zip java/ res/ AndroidManifest.xml
          cd ../../..
          
          gh release create "$tag" "$apk" --title "$tag" --draft
          if [ -f build/web-source.zip ]; then gh release upload "$tag" build/web-source.zip; fi
          if [ -f android-src.zip ]; then gh release upload "$tag" android-src.zip; fi
