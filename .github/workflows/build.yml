# .github/workflows/build.yml
# Build APK — reads metadata from app-release-metadata.yml
# No manual inputs needed — version, content, and URLs auto-detected

name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Parse metadata file
        run: |
          pip install pyyaml 2>/dev/null || true
          
          python3 << 'PYTHON_SCRIPT'
          import yaml
          
          try:
              import yaml
              with open('app-release-metadata.yml', 'r') as f:
                  meta = yaml.safe_load(f)
          except ImportError:
              meta = {}
              with open('app-release-metadata.yml', 'r') as f:
                  for line in f:
                      line = line.strip()
                      if line and not line.startswith('#') and ':' in line:
                          key, value = line.split(':', 1)
                          key = key.strip()
                          value = value.strip().strip('"').strip("'")
                          if value and not value.startswith('#'):
                              meta[key] = value
          
          with open('parsed_meta.txt', 'w') as out:
              for key, value in meta.items():
                  if value is None:
                      out.write(f'{key}=\n')
                  elif isinstance(value, str) and value == '':
                      out.write(f'{key}=\n')
                  elif isinstance(value, bool):
                      out.write(f'{key}={str(value).lower()}\n')
                  elif isinstance(value, (int, float)):
                      out.write(f'{key}={value}\n')
                  elif isinstance(value, list):
                      out.write(f'{key}={{"|".join(str(v) for v in value)}}\n')
                  else:
                      out.write(f'{key}={value}\n')
          PYTHON_SCRIPT
          
          while IFS='=' read -r key value; do
              echo "$key=$value" >> $GITHUB_ENV
          done < parsed_meta.txt
          
          echo "Parsed metadata:"
          echo "  git_repo: $git_repo"
          echo "  archive_url: $archive_url"
          echo "  web_url_fallback: $web_url_fallback"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Download and bundle web content
        run: |
          mkdir -p app/src/main/assets/web

          if [ -n "${{ env.git_repo }}" ]; then
            echo "Downloading latest release from ${{ env.git_repo }}..."
            
            REPO_PATH=$(echo "${{ env.git_repo }}" | sed -E 's|^https://[^/]+/([^/]+)/(.+)$|\1/\2|')
            OWNER=$(echo "$REPO_PATH" | cut -d'/' -f1)
            NAME=$(echo "$REPO_PATH" | cut -d'/' -f2)
            
            echo "Repo path: $REPO_PATH"
            echo "Owner: $OWNER"
            echo "Name: $NAME"
            
            if echo "${{ env.git_repo }}" | grep -q "github.com"; then
              echo "Fetching from GitHub API..."
              curl -s "https://api.github.com/repos/$OWNER/$NAME/releases/latest" > latest_release.json
              
              if ! jq empty latest_release.json 2>/dev/null; then
                echo "❌ Invalid JSON from GitHub API"
                cat latest_release.json
                exit 1
              fi
              
              LATEST_VERSION=$(jq -r '.tag_name' latest_release.json | sed 's/^v//')
              if [ "$LATEST_VERSION" = "null" ] || [ -z "$LATEST_VERSION" ]; then
                echo "❌ No version found in GitHub release"
                exit 1
              fi
              
              RELEASE_URL=$(jq -r '.assets[0].browser_download_url' latest_release.json)
              if [ -z "$RELEASE_URL" ] || [ "$RELEASE_URL" = "null" ]; then
                echo "❌ No download URL found in GitHub release"
                exit 1
              fi
              
              curl -s "https://api.github.com/repos/$OWNER/$NAME/releases" > all_releases.json
              
              # Count releases matching v$LATEST_VERSION or v$LATEST_VERSION.*
              EXISTING_COUNT=$(jq -r --arg ver "$LATEST_VERSION" \
                '[.[] | select(.tag_name == ("v" + $ver) or (.tag_name | startswith("v" + $ver + ".")))] | length' all_releases.json)

              if [ "$EXISTING_COUNT" -eq 0 ]; then
                  FINAL_VERSION="$LATEST_VERSION"
              elif [ "$EXISTING_COUNT" -eq 1 ]; then
                  FINAL_VERSION="$LATEST_VERSION.1"
              else
                  FINAL_VERSION="$LATEST_VERSION.$(( EXISTING_COUNT - 1 ))"
              fi
              
              echo "Latest release version: $LATEST_VERSION"
              echo "Existing builds with same version: $EXISTING_COUNT"
              echo "New version: $FINAL_VERSION"
              
            elif echo "${{ env.git_repo }}" | grep -q "gitlab.com"; then
              echo "Fetching from GitLab API..."
              
              curl -s "https://gitlab.com/api/v4/projects/$OWNER%2F$NAME/releases" > gitlab_releases.json
              
              if ! jq empty gitlab_releases.json 2>/dev/null; then
                echo "❌ Invalid JSON from GitLab API"
                cat gitlab_releases.json
                exit 1
              fi
              
              LATEST_VERSION=$(jq -r '.[0].tag_name // empty' gitlab_releases.json | sed 's/^v//')
              if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
                echo "❌ No version found in GitLab releases"
                exit 1
              fi
              
              RELEASE_URL=$(jq -r '.[0].assets.sources[0].url // empty' gitlab_releases.json)
              if [ -z "$RELEASE_URL" ] || [ "$RELEASE_URL" = "null" ]; then
                echo "⚠️ No release assets found — building GitLab archive URL..."
                # GitLab provides source archives for tags: /-/archive/{tag}.zip
                RELEASE_URL="https://gitlab.com/mamie_ia/tracks-to-pictures/-/archive/$LATEST_VERSION/tracks-to-pictures-$LATEST_VERSION.zip"
                echo "  Using: $RELEASE_URL"
              fi
              
              curl -s "https://gitlab.com/api/v4/projects/$OWNER%2F$NAME/releases" > gitlab_releases_count.json
              
              # Count releases matching v$LATEST_VERSION or v$LATEST_VERSION.*
              EXISTING_COUNT=$(jq -r --arg ver "$LATEST_VERSION" \
                '[.[] | select(.tag_name == ("v" + $ver) or (.tag_name | startswith("v" + $ver + ".")))] | length' gitlab_releases_count.json)

              if [ "$EXISTING_COUNT" -eq 0 ]; then
                  FINAL_VERSION="$LATEST_VERSION"
              elif [ "$EXISTING_COUNT" -eq 1 ]; then
                  FINAL_VERSION="$LATEST_VERSION.1"
              else
                  FINAL_VERSION="$LATEST_VERSION.$(( EXISTING_COUNT - 1 ))"
              fi
              
              echo "Latest release version: $LATEST_VERSION"
              echo "Existing builds with same version: $EXISTING_COUNT"
              echo "New version: $FINAL_VERSION"
              
            else
              echo "❌ Unsupported repo type (only github.com and gitlab.com supported)"
              exit 1
            fi
            
            echo "$FINAL_VERSION" > version_name.txt
            
            echo "Release URL: $RELEASE_URL"
            curl -sL "$RELEASE_URL" -o web-archive.zip
          fi

          if [ -n "${{ env.archive_url }}" ]; then
            echo "Downloading archive from ${{ env.archive_url }}..."
            curl -sL "${{ env.archive_url }}" -o web-archive.zip
          fi

          if [ -f web-archive.zip ]; then
            echo "Extracting web archive..."
            unzip -qj web-archive.zip -d app/src/main/assets/web/
            cp web-archive.zip web-source.zip
            rm web-archive.zip
          fi

          echo "Assets content:"
          ls -la app/src/main/assets/web/

      - name: Set version
        run: |
          VERSION_NAME=""
          
          if [ -z "$VERSION_NAME" ]; then
            if [ -f version_name.txt ]; then
              VERSION_NAME=$(cat version_name.txt)
              echo "Using computed version from git repo: $VERSION_NAME"
            elif [ -n "${{ env.archive_url }}" ]; then
              echo "Fetching latest GitHub release to compute version..."
              LATEST_TAG=$(curl -s "https://api.github.com/repos/supermamie/tracks-to-pictures-Android/releases/latest" | jq -r '.tag_name')
              
              if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
                VERSION_NAME="1.0.0"
                echo "No existing releases, starting with $VERSION_NAME"
              else
                LAST_VERSION=$(echo $LATEST_TAG | sed 's/^v//')
                VERSION_NAME=$(echo $LAST_VERSION | awk -F. '{printf "%d.%d.%d", $1, $2, $3+1}')
                echo "Incremented from $LAST_VERSION to $VERSION_NAME"
              fi
            else
              VERSION_NAME="1.0.0"
              echo "No git_repo or archive_url, defaulting to $VERSION_NAME"
            fi
          fi
          
          VERSION_CODE=$(( $(git rev-list --count HEAD) + 1000 ))

          # Update build.gradle with new version and web URL using Python helper
          python3 .github/scripts/modify_build_gradle.py \
            "${VERSION_NAME}" \
            "${VERSION_CODE}" \
            "${{ env.web_url_fallback }}"

          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV

      - name: Verify package name consistency
        run: |
          PKG_NAME="${{ env.package_name }}"
          
          echo "Expected package name: $PKG_NAME"
          
          echo "Searching for incorrect package names..."
          for file in $(find app/src -type f \( -name "*.kt" -o -name "*.java" -o -name "*.xml" -o -name "*.gradle" \) ! -path "*/build/*"); do
            if grep -q "com\.mamie.*tracks2pictures" "$file" && ! grep -q "^package $PKG_NAME$" "$file" && ! grep -q "namespace '$PKG_NAME'" "$file" && ! grep -q "applicationId \"$PKG_NAME\"" "$file"; then
              echo "⚠️  Found potential incorrect package in: $file"
              grep "com\.mamie.*tracks2pictures" "$file" | head -3
            fi
          done
          
          # Exclude build.yml itself (contains the grep pattern)
          for file in $(find . -type f \( -name "*.md" -o -name "*.yml" -o -name "*.yaml" \) -not -path "./app-release-metadata.yml" -not -name "build.yml"); do
            if grep -q "com\.mamieia\.tracks2pictures" "$file"; then
              echo "⚠️  Found old package name 'com.mamieia.tracks2pictures' in: $file"
            fi
          done
          
          echo "Package name consistency check complete."
          
          if grep -r "com\.mamieia\.tracks2pictures" app/src/ app/build.gradle 2>/dev/null; then
            echo "❌ ERROR: Old package name 'com.mamieia.tracks2pictures' still present!"
            exit 1
          fi
          
          echo "✓ No old package name found."
          
      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tracks-to-pictures-${{ env.VERSION_NAME }}.apk
          path: app/build/outputs/apk/release/app-release.apk
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          apk=app/build/outputs/apk/release/app-release.apk
          tag="v${{ env.VERSION_NAME }}"
          gh release create "$tag" "$apk" --title "$tag" --draft
          if [ -f web-source.zip ]; then
            gh release upload "$tag" web-source.zip
            echo "✅ Added web-source.zip to release"
          else
            echo "⚠️ No web-source.zip found — skipped"
          fi

          name: "v${{ env.VERSION_NAME }}"
          draft: true
          files: |
            app/build/outputs/apk/release/app-release.apk
            web-source.zip
