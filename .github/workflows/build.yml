# .github/workflows/build.yml
# Build APK — manual trigger only (no auto-trigger on push/PR)

name: Build APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g., 1.0.0)"
        required: false
        default: "1.0.0"
      web_url:
        description: "Web URL to load (optional)"
        required: false
        default: "https://mamie-ia.gitlab.io/tracks-to-pictures/"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: gradle

      - name: Set ANDROID_HOME
        run: |
          echo "ANDROID_HOME=$HOME/Android/sdk" >> $GITHUB_ENV

      - name: Download SDK command-line tools
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sL "https://dl.google.com/android/repository/command-line-tools-linux-11079766.zip" -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip

      - name: Install SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Set version
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          VERSION_CODE=$(( $(git rev-list --count HEAD) + 1000 ))

          # Update build.gradle with new version
          sed -i "s/versionName \".*\"/versionName \"${VERSION_NAME}\"/" app/build.gradle
          sed -i "s/versionCode .*/versionCode ${VERSION_CODE}/" app/build.gradle

          # Update web URL if provided
          if [ -n "${{ github.event.inputs.web_url }}" ]; then
            WEB_URL="${{ github.event.inputs.web_url }}"
            sed -i "s/buildConfigField \"String\", \"WEB_URL\", .*/buildConfigField \"String\", \"WEB_URL\", '\"${WEB_URL}\"'/" app/build.gradle
          fi

          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV

      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tracks-to-pictures-${{ env.VERSION_NAME }}.apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: "v${{ env.VERSION_NAME }}"
          draft: true
          files: app/build/outputs/apk/release/app-release.apk
