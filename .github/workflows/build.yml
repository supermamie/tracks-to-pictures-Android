# GitHub Workflow — Build and Release Android APK
# Triggers only on manual workflow_dispatch

name: Build and Release Android APK
on:
  workflow_dispatch:

env:
  OWNER: supermamie
  NAME: tracks-to-pictures-Android
  GITLAB_PROJECT: "mamie_ia%2Ftracks-to-pictures"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Checkout Android repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OWNER }}/${{ env.NAME }}
          ref: main
          path: android
          fetch-depth: 0

      - name: Download web archive from GitLab
        id: download-web
        run: |
          mkdir -p android/build
          # Get latest release from GitLab
          curl -s "https://gitlab.com/api/v4/projects/$GITLAB_PROJECT/releases" > releases.json
          
          LATEST_TAG=$(jq -r '.[0].tag_name // empty' releases.json)
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "❌ No releases found for GitLab repo"
            exit 1
          fi
          
          echo "Latest GitLab release: $LATEST_TAG"
          
          # Count all matching versions for incremental numbering
          # Use --argjson to safely parse the array
          ALL_COUNT=$(jq -r --arg ver "$LATEST_TAG" \
            '[.[] | select(.tag_name == "v" + $ver or .tag_name | startswith("v" + $ver + "."))] | length' releases.json)
          
          INCREMENTAL_COUNT=$(jq -r --arg ver "$LATEST_TAG" \
            '[.[] | select(.tag_name | startswith("v" + $ver + "."))] | length' releases.json)
          
          # Determine the build version
          if [ "$INCREMENTAL_COUNT" -eq 0 ]; then
            BUILD_VERSION="$LATEST_TAG"
          else
            BUILD_VERSION="$LATEST_TAG.$(( INCREMENTAL_COUNT + 1 ))"
          fi
          
          # Check if this version already exists in GitHub
          curl -s "https://api.github.com/repos/$OWNER/$NAME/releases" > gh_releases.json
          EXISTING_CHECK=$(jq -r --arg ver "$BUILD_VERSION" \
            '[.[] | select(.tag_name == "v" + $ver)] | length' gh_releases.json)
          
          if [ "$EXISTING_CHECK" -gt 0 ]; then
            BUILD_VERSION="$BUILD_VERSION.1"
          fi
          
          echo "Build version: $BUILD_VERSION"
          echo "VERSION_NAME=$BUILD_VERSION" >> $GITHUB_ENV
          
          # Download the web archive from GitLab
          ARCHIVE_URL="https://gitlab.com/$GITLAB_PROJECT/-/archive/$LATEST_TAG/tracks-to-pictures-$LATEST_TAG.zip"
          echo "Downloading: $ARCHIVE_URL"
          curl -L -o android/build/web-source.zip "$ARCHIVE_URL"
          echo "✅ Downloaded: $(du -b android/build/web-source.zip | cut -f1) bytes"

      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_NAME: ${{ env.VERSION_NAME }}
        run: |
          cd android
          apk=app/build/outputs/apk/release/app-release.apk
          tag="v${{ env.VERSION_NAME }}"
          
          # Create Android source archive
          echo "Creating Android source archive..."
          cd app/src/main
          zip -r ../../android-src.zip java/ res/ AndroidManifest.xml
          cd ../../..
          
          gh release create "$tag" "$apk" --title "$tag" --draft
          if [ -f web-source.zip ]; then
            gh release upload "$tag" web-source.zip
          fi
          if [ -f android-src.zip ]; then
            gh release upload "$tag" android-src.zip
          fi
