# .github/workflows/build.yml
# Build APK — reads metadata from app-release-metadata.yml
# No manual inputs needed — version, content, and URLs auto-detected

name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'app-release-metadata.yml'
    paths-ignore:
      - '.github/workflows/build.yml'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Parse metadata file
        run: |
          # Install Python YAML parser if not available
          pip install pyyaml 2>/dev/null || true
          
          # Read app-release-metadata.yml and extract values
          python3 << 'PYTHON_SCRIPT'
          import yaml
          
          try:
              import yaml
              with open('app-release-metadata.yml', 'r') as f:
                  meta = yaml.safe_load(f)
          except ImportError:
              # Fallback: simple key=value parser (no nested structures)
              meta = {}
              with open('app-release-metadata.yml', 'r') as f:
                  for line in f:
                      line = line.strip()
                      if line and not line.startswith('#') and ':' in line:
                          key, value = line.split(':', 1)
                          key = key.strip()
                          value = value.strip().strip('"').strip("'")
                          if value and not value.startswith('#'):
                              meta[key] = value
          
          # Output key=value pairs for shell use
          with open('parsed_meta.txt', 'w') as out:
              for key, value in meta.items():
                  # Handle None and empty values
                  if value is None:
                      out.write(f'{key}=\n')
                  elif isinstance(value, str) and value == '':
                      out.write(f'{key}=\n')
                  elif isinstance(value, bool):
                      out.write(f'{key}={str(value).lower()}\n')
                  elif isinstance(value, (int, float)):
                      out.write(f'{key}={value}\n')
                  elif isinstance(value, list):
                      out.write(f'{key}={"|".join(str(v) for v in value)}\n')
                  else:
                      out.write(f'{key}={value}\n')
          PYTHON_SCRIPT
          
          # Load values into GitHub environment
          while IFS='=' read -r key value; do
              echo "${key}=${value}" >> $GITHUB_ENV
          done < parsed_meta.txt
          
          echo "Parsed metadata:"
          echo "  git_repo: $git_repo"
          echo "  archive_url: $archive_url"
          echo "  web_url_fallback: $web_url_fallback"

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: gradle

      - name: Set ANDROID_HOME
        run: |
          echo "ANDROID_HOME=$HOME/Android/sdk" >> $GITHUB_ENV

      - name: Download SDK command-line tools
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sL "https://dl.google.com/android/repository/command-line-tools-linux-11079766.zip" -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip

      - name: Install SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Download and bundle web content
        run: |
          mkdir -p app/src/main/assets/web

          # Case 1: Download from Git repo release
          if [ -n "${{ env.git_repo }}" ]; then
            echo "Downloading latest release from ${{ env.git_repo }}..."
            
            # Extract repo owner and name from URL
            REPO=$(echo ${{ env.git_repo }} | sed -E 's|https://([^/]+)/(.*)|\1/\2|' | sed 's|\.git$||')
            OWNER=$(echo $REPO | cut -d'/' -f1)
            NAME=$(echo $REPO | cut -d'/' -f2)
            
            echo "Repo: $OWNER/$NAME"
            
            # Get latest release
            if echo ${{ env.git_repo }} | grep -q "github.com"; then
              # GitHub API: get latest release
              curl -s "https://api.github.com/repos/$OWNER/$NAME/releases/latest" > latest_release.json
              LATEST_VERSION=$(jq -r '.tag_name' latest_release.json | sed 's/^v//')
              RELEASE_URL=$(jq -r '.assets[].browser_download_url' latest_release.json | head -1)
              
              # Count existing releases with same version prefix (e.g., 1.0.3.1, 1.0.3.2)
              curl -s "https://api.github.com/repos/$OWNER/$NAME/releases" > all_releases.json
              
              # Count tags starting with "v{LATEST_VERSION}." (e.g., v1.0.3.1)
              FILTER_PREFIX="v${LATEST_VERSION}."
              EXISTING_COUNT=$(jq -r --arg fp "$FILTER_PREFIX" \
                '[.[] | select(.tag_name | startswith($fp))] | length' all_releases.json)
              
              # First build with this version -> use LATEST_VERSION itself (e.g., 1.0.3)
              # Subsequent builds -> increment (e.g., 1.0.3.1, 1.0.3.2)
              if [ "$EXISTING_COUNT" -eq 0 ]; then
                  FINAL_VERSION="${LATEST_VERSION}"
              else
                  FINAL_VERSION="${LATEST_VERSION}.${EXISTING_COUNT}"
              fi
              
              echo "Latest release version: $LATEST_VERSION"
              echo "Existing builds with same version: $EXISTING_COUNT"
              echo "New version: $FINAL_VERSION"
              
            elif echo ${{ env.git_repo }} | grep -q "gitlab.com"; then
              # GitLab API: get latest release
              curl -s "https://gitlab.com/api/v4/projects/${OWNER}%2F${NAME}/releases" > latest_releases.json
              
              LATEST_VERSION=$(jq -r '.[0].tag_name // empty' latest_releases.json)
              RELEASE_URL=$(jq -r '.[0].assets.links[0].direct_asset_url' latest_releases.json)
              
              # Count existing releases with same version prefix (e.g., 1.0.3.1, 1.0.3.2)
              curl -s "https://gitlab.com/api/v4/projects/${OWNER}%2F${NAME}/releases" > gitlab_releases.json
              
              # Count tags starting with "v{LATEST_VERSION}." (e.g., v1.0.3.1)
              FILTER_PREFIX="v${LATEST_VERSION}."
              EXISTING_COUNT=$(jq -r --arg fp "$FILTER_PREFIX" \
                '[.[] | select(.tag_name | startswith($fp))] | length' gitlab_releases.json)
              
              # First build with this version -> use LATEST_VERSION itself (e.g., 1.0.3)
              # Subsequent builds -> increment (e.g., 1.0.3.1, 1.0.3.2)
              if [ "$EXISTING_COUNT" -eq 0 ]; then
                  FINAL_VERSION="${LATEST_VERSION}"
              else
                  FINAL_VERSION="${LATEST_VERSION}.${EXISTING_COUNT}"
              fi
              
              echo "Latest release version: $LATEST_VERSION"
              echo "Existing builds with same version: $EXISTING_COUNT"
              echo "New version: $FINAL_VERSION"
              
            else
              echo "Unsupported repo type"
              exit 1
            fi
            
            # Save final version to file (persists between steps)
            echo "$FINAL_VERSION" > version_name.txt
            
            echo "Release URL: $RELEASE_URL"
            curl -sL "$RELEASE_URL" -o web-archive.zip
          fi

          # Case 2: Download from direct URL
          if [ -n "${{ env.archive_url }}" ]; then
            echo "Downloading archive from ${{ env.archive_url }}..."
            curl -sL "${{ env.archive_url }}" -o web-archive.zip
          fi

          # Extract archive to assets
          if [ -f web-archive.zip ]; then
            echo "Extracting web archive..."
            unzip -q web-archive.zip -d app/src/main/assets/web/
            rm web-archive.zip
          fi

          echo "Assets content:"
          ls -la app/src/main/assets/web/

      - name: Set version
        run: |
          VERSION_NAME=""
          
          # Auto-determine version if not provided
          if [ -z "$VERSION_NAME" ]; then
            if [ -f version_name.txt ]; then
              # git_repo was used: use computed version
              VERSION_NAME=$(cat version_name.txt)
              echo "Using computed version from git repo: $VERSION_NAME"
            elif [ -n "${{ env.archive_url }}" ]; then
              # archive_url was used: fetch latest GitHub release and increment
              echo "Fetching latest GitHub release to compute version..."
              LATEST_TAG=$(curl -s "https://api.github.com/repos/supermamie/tracks-to-pictures-Android/releases/latest" | jq -r '.tag_name')
              
              if [ "$LATEST_TAG" = "null" ] || [ -z "$LATEST_TAG" ]; then
                VERSION_NAME="1.0.0"
                echo "No existing releases, starting with $VERSION_NAME"
              else
                LAST_VERSION=$(echo $LATEST_TAG | sed 's/^v//')
                # Increment the last segment (e.g., 1.0.3.2 -> 1.0.3.3)
                VERSION_NAME=$(echo $LAST_VERSION | awk -F. '{printf "%d.%d.%d", $1, $2, $3+1}')
                echo "Incremented from $LAST_VERSION to $VERSION_NAME"
              fi
            else
              VERSION_NAME="1.0.0"
              echo "No git_repo or archive_url, defaulting to $VERSION_NAME"
            fi
          fi
          
          # Increment version_code based on git history
          VERSION_CODE=$(( $(git rev-list --count HEAD) + 1000 ))

          # Update build.gradle with new version
          sed -i "s/versionName \".*\"/versionName \"${VERSION_NAME}\"/" app/build.gradle
          sed -i "s/versionCode .*/versionCode ${VERSION_CODE}/" app/build.gradle

          # Update web URL from metadata file
          if [ -n "${{ env.web_url_fallback }}" ]; then
            WEB_URL="${{ env.web_url_fallback }}"
            sed -i "s/buildConfigField \"String\", \"WEB_URL\", .*/buildConfigField \"String\", \"WEB_URL\", '${WEB_URL}'/" app/build.gradle
          else
            # Empty web_url_fallback — set about:blank so MainActivity loads error.html
            sed -i "s/buildConfigField \"String\", \"WEB_URL\", .*/buildConfigField \"String\", \"WEB_URL\", 'about:blank'/" app/build.gradle
            echo "web_url_fallback is empty — will load error page instead" >> $GITHUB_STEP_LOG
          fi

          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV

      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tracks-to-pictures-${{ env.VERSION_NAME }}.apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: "v${{ env.VERSION_NAME }}"
          draft: true
          files: app/build/outputs/apk/release/app-release.apk
