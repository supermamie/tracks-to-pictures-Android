# .github/workflows/build.yml
# Build APK — manual trigger only (no auto-trigger on push/PR)

name: Build APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (e.g., 1.0.0). If git_repo is provided, uses latest release version + counter."
        required: false
        default: "1.0.0"
      git_repo:
        description: "Git repo URL to fetch latest release from (GitHub/GitLab)"
        required: false
        default: ""
      archive_url:
        description: "Direct URL to an archive file to download"
        required: false
        default: ""
      web_url:
        description: "Fallback web URL if no bundle is provided"
        required: false
        default: "https://mamie-ia.gitlab.io/tracks-to-pictures/"

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"
          cache: gradle

      - name: Set ANDROID_HOME
        run: |
          echo "ANDROID_HOME=$HOME/Android/sdk" >> $GITHUB_ENV

      - name: Download SDK command-line tools
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sL "https://dl.google.com/android/repository/command-line-tools-linux-11079766.zip" -o cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mv cmdline-tools latest
          rm cmdline-tools.zip

      - name: Install SDK components
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Download and bundle web content
        run: |
          mkdir -p app/src/main/assets/web

          # Case 1: Download from Git repo release
          if [ -n "${{ github.event.inputs.git_repo }}" ]; then
            echo "Downloading latest release from ${{ github.event.inputs.git_repo }}..."
            
            # Extract repo owner and name from URL
            REPO=$(echo ${{ github.event.inputs.git_repo }} | sed -E 's|https://([^/]+)/(.*)|\1/\2|' | sed 's|\.git$||')
            OWNER=$(echo $REPO | cut -d'/' -f1)
            NAME=$(echo $REPO | cut -d'/' -f2)
            
            echo "Repo: $OWNER/$NAME"
            
            # Get latest release
            if echo ${{ github.event.inputs.git_repo }} | grep -q "github.com"; then
              # GitHub API: get latest release
              curl -s "https://api.github.com/repos/$OWNER/$NAME/releases/latest" > latest_release.json
              LATEST_VERSION=$(jq -r '.tag_name' latest_release.json | sed 's/^v//')
              RELEASE_URL=$(jq -r '.assets[].browser_download_url' latest_release.json | head -1)
              
              # Count existing releases with same version prefix (e.g., 1.0.3.1, 1.0.3.2)
              curl -s "https://api.github.com/repos/$OWNER/$NAME/releases" > all_releases.json
              
              EXISTING_COUNT=$(jq -r '[.[] | select(.tag_name | startswith("v${LATEST_VERSION}.\"))] | length' all_releases.json)
              
              # First build with this version → use LATEST_VERSION itself (e.g., 1.0.3)
              # Subsequent builds → increment (e.g., 1.0.3.1, 1.0.3.2)
              if [ "$EXISTING_COUNT" -eq 0 ]; then
                  FINAL_VERSION="${LATEST_VERSION}"
              else
                  FINAL_VERSION="${LATEST_VERSION}.${EXISTING_COUNT}"
              fi
              
              echo "Latest release version: $LATEST_VERSION"
              echo "Existing builds with same version: $EXISTING_COUNT"
              echo "New version: $FINAL_VERSION"
              
            elif echo ${{ github.event.inputs.git_repo }} | grep -q "gitlab.com"; then
              # GitLab API: get latest release
              curl -s "https://gitlab.com/api/v4/projects/${OWNER}%2F${NAME}/releases" > latest_releases.json
              
              LATEST_VERSION=$(jq -r '.[0].tag_name // empty' latest_releases.json)
              RELEASE_URL=$(jq -r '.[0].assets.links[0].direct_asset_url' latest_releases.json)
              
              # Count existing releases with same version prefix (e.g., 1.0.3.1, 1.0.3.2)
              curl -s "https://gitlab.com/api/v4/projects/${OWNER}%2F${NAME}/releases" > all_releases.json
              
              EXISTING_COUNT=$(jq -r '[.[] | select(.tag_name | startswith("v${LATEST_VERSION}.\"))] | length' all_releases.json)
              
              # First build with this version → use LATEST_VERSION itself (e.g., 1.0.3)
              # Subsequent builds → increment (e.g., 1.0.3.1, 1.0.3.2)
              if [ "$EXISTING_COUNT" -eq 0 ]; then
                  FINAL_VERSION="${LATEST_VERSION}"
              else
                  FINAL_VERSION="${LATEST_VERSION}.${EXISTING_COUNT}"
              fi
              
              echo "Latest release version: $LATEST_VERSION"
              echo "Existing builds with same version: $EXISTING_COUNT"
              echo "New version: $FINAL_VERSION"
              
            else
              echo "Unsupported repo type"
              exit 1
            fi
            
            # Save final version to file (persists between steps)
            echo "$FINAL_VERSION" > version_name.txt
            
            echo "Release URL: $RELEASE_URL"
            curl -sL "$RELEASE_URL" -o web-archive.zip
          fi

          # Case 2: Download from direct URL
          if [ -n "${{ github.event.inputs.archive_url }}" ]; then
            echo "Downloading archive from ${{ github.event.inputs.archive_url }}..."
            curl -sL "${{ github.event.inputs.archive_url }}" -o web-archive.zip
          fi

          # Extract archive to assets
          if [ -f web-archive.zip ]; then
            echo "Extracting web archive..."
            unzip -q web-archive.zip -d app/src/main/assets/web/
            rm web-archive.zip
          fi

          echo "Assets content:"
          ls -la app/src/main/assets/web/

      - name: Set version
        run: |
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          
          # If git_repo was provided and no explicit version_name, use computed version
          if [ -n "${{ github.event.inputs.git_repo }}" ] && [ -z "${{ github.event.inputs.version_name }}" ]; then
            if [ -f version_name.txt ]; then
              VERSION_NAME=$(cat version_name.txt)
              echo "Using computed version from git repo: $VERSION_NAME"
            fi
          fi
          
          # Increment version_code based on git history
          VERSION_CODE=$(( $(git rev-list --count HEAD) + 1000 ))

          # Update build.gradle with new version
          sed -i "s/versionName \".*\"/versionName \"${VERSION_NAME}\"/" app/build.gradle
          sed -i "s/versionCode .*/versionCode ${VERSION_CODE}/" app/build.gradle

          # Update web URL if provided
          if [ -n "${{ github.event.inputs.web_url }}" ]; then
            WEB_URL="${{ github.event.inputs.web_url }}"
            sed -i "s/buildConfigField \"String\", \"WEB_URL\", .*/buildConfigField \"String\", \"WEB_URL\", '${WEB_URL}'/" app/build.gradle
          else
            # Empty web_url — set about:blank so MainActivity loads error.html
            sed -i "s/buildConfigField \"String\", \"WEB_URL\", .*/buildConfigField \"String\", \"WEB_URL\", 'about:blank'/" app/build.gradle
            echo "web_url is empty — will load error page instead" >> $GITHUB_STEP_LOG
          fi

          echo "VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV

      - name: Build APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tracks-to-pictures-${{ env.VERSION_NAME }}.apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: "v${{ env.VERSION_NAME }}"
          draft: true
          files: app/build/outputs/apk/release/app-release.apk
