# GitHub Workflow — Build and Release Android APK
# Triggers only on manual workflow_dispatch

name: Build and Release Android APK
on:
  workflow_dispatch:

env:
  OWNER: supermamie
  NAME: tracks-to-pictures-Android

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Checkout Android repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OWNER }}/${{ env.NAME }}
          ref: feature/new-build
          path: android
          fetch-depth: 0

      - name: Download web archive from GitLab
        run: |
          mkdir -p android/build
          
          # Get the latest release tag from GitLab
          LATEST_TAG=$(python3 android/.github/scripts/get_gitlab_release.py)
          
          echo "Latest GitLab release: $LATEST_TAG"
          
          # Download the web archive
          curl -sfL "https://gitlab.com/mamie_ia/tracks-to-pictures/-/archive/$LATEST_TAG/tracks-to-pictures-$LATEST_TAG.zip" \
            -o android/build/web-source.zip
          
          echo "Downloaded: $(du -b android/build/web-source.zip | cut -f1) bytes"

      - name: Extract web archive and place content in assets
        run: |
          cd android
          
          # Extract the web archive into build/ (cd into build/ first so unzip places files at top level)
          mkdir -p build
          cd build
          unzip -o web-source.zip
          cd ..
          
          # Show extracted files
          echo "Extracted directory structure:"
          find build/ -maxdepth 2 -type f | sort | head -30
          
          # Place web content in assets (all files from the extracted folder)
          python3 .github/scripts/place_web_content.py build app/src/main/assets/web
          
          echo "Assets contents:"
          find app/src/main/assets/web/ -type f | sort

      - name: Build version from existing Android releases
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd android
          VERSION=$(python3 .github/scripts/get_version.py "$OWNER" "$NAME")
          echo "New version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update version in build.gradle
        run: |
          cd android
          VERSION="${{ steps.version.outputs.version }}"
          VER_NUM=$(echo "$VERSION" | sed 's/^v//')
          
          # Update versionName and versionCode in app/build.gradle
          sed -i "s/versionCode.*/versionCode 1/" app/build.gradle
          sed -i "s/versionName.*/versionName \\\"$VER_NUM\\\"/" app/build.gradle
          
          echo "Updated versionName to $VER_NUM"
          grep -E "versionCode|versionName" app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd android
          apk=app/build/outputs/apk/release/app-release.apk
          version="${{ steps.version.outputs.version }}"
          tag="${version}"
          
          # Create build archive (Android code + web content)
          echo "Creating build archive..."
          zip -r ../build-android.zip \
            app/src/main/java/ \
            app/src/main/res/ \
            app/src/main/AndroidManifest.xml \
            app/build.gradle \
            build.gradle \
            gradle/ \
            gradlew \
            gradlew.bat \
            settings.gradle \
            .github/ \
            app/src/main/assets/web/ \
            app/release-key.keystore \
            app/proguard-rules.pro \
            -x ".git/*" "app/build/*"
          
          gh release create "$tag" "$apk" --title "$tag" --draft
          if [ -f build-android.zip ]; then gh release upload "$tag" build-android.zip; fi
