import java.security.KeyStore

plugins {
    id 'com.android.application' version '8.4.0'
}

def keystoreFile = file("release-key.keystore")

android {
    namespace 'com.mamieia.tracks2pictures'
    compileSdk 34

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.mamieia.tracks2pictures"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
        buildConfigField "String", "WEB_URL", '"https://mamie-ia.gitlab.io/tracks-to-pictures/"'
    }

    signingConfigs {
        release {
            if (keystoreFile.exists()) {
                storeFile = keystoreFile
                storePassword = "android"
                keyAlias = "trackstopictures"
                keyPassword = "android"
            } else {
                storeFile = file("dev-debug.keystore")
                storePassword = "android"
                keyAlias = "debug"
                keyPassword = "android"
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig = signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
