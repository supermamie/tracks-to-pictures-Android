<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <style>
        body {
            background-color: blue;
            color: white;
            font-family: sans-serif;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="result"></div>
    <script>
        (function() {
            'use strict';
            var choice = Math.floor(Math.random() * 2) + 1;
            var text = choice === 1 ? "UN" : "DEUX";
            document.getElementById('result').textContent = "J'ai choisi : " + text;
        })();
    </script>
</body>
</html>
