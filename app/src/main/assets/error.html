<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracks to Pictures — Error</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #eee;
        }
        .error-container {
            text-align: center;
            padding: 40px;
        }
        .error-code {
            font-size: 80px;
            font-weight: bold;
            color: #e94560;
            margin: 0;
        }
        h2 {
            font-size: 24px;
            margin: 20px 0 10px;
            font-weight: 400;
        }
        p {
            font-size: 16px;
            color: #aaa;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <h2>Internal Error</h2>
        <p>The web source is not configured.</p>
        <p>Please rebuild your APK with a valid web URL.</p>
    </div>
</body>
</html>
